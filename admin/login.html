<!doctype html><html lang='pt-BR'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Login — Painel Câmara VGRP</title><style>body{margin:0;font-family:Sora,Arial;background:#0b0f0b;color:#e2ebe2;display:grid;place-items:center;height:100vh}.card{width:min(460px,92vw);background:#111711;border:1px solid #2a3a2a;border-radius:14px;padding:26px;box-shadow:0 12px 40px rgba(0,0,0,.45)}h1{margin:0 0 8px;font-size:22px}.mut{color:#7a9a7a;font-size:13px}.row{display:flex;flex-direction:column;gap:6px;margin-top:14px}input{background:#181f18;border:1px solid #2a3a2a;color:#e2ebe2;border-radius:8px;padding:11px}.btn{margin-top:16px;width:100%;padding:12px;background:#2ecc40;border:0;border-radius:8px;font-weight:700;cursor:pointer}.warn{margin-top:14px;padding:10px;border-radius:8px;background:#1f281f;border:1px solid #2a3a2a;font-size:13px}</style></head><body><main class='card'><h1>Acesso administrativo</h1><p class='mut'>Base visual do painel da Câmara, separada do site público.</p><div class='row'><label>E-mail institucional</label><input type='email' placeholder='nome@camaravgrp.mg.gov.br'></div><div class='row'><label>Senha</label><input type='password' placeholder='Senha será validada no backend'></div><button class='btn' type='button'>Entrar</button><div class='warn'>Área administrativa em preparação. Produção exige autenticação segura no backend.</div><p class='mut'>Sem credenciais fixas em HTML/JS.</p></main></body></html>
