<!doctype html><html><body style="background:#0d120d;color:#d8ead8;font-family:Arial;display:grid;place-items:center;height:100vh"><form id="f" style="background:#131d13;padding:20px;border:1px solid #2f4d2f"><h3>Login Admin</h3><input name="email" placeholder="Email"><br><br><input type="password" name="password" placeholder="Senha"><br><br><button>Entrar</button><p id="m"></p></form><script>f.onsubmit=async(e)=>{e.preventDefault();const d={email:f.email.value,password:f.password.value};const r=await fetch('api/auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});const j=await r.json();if(j.ok)location.href='index.html#/dashboard';else m.textContent=j.error||'Erro';};</script></body></html>
